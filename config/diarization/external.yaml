# External Diarization Provider Configuration
# Configuration for production-ready external speaker diarization services

# @package _global_
diarization:
  # Provider configuration
  providers:
    enabled: ["assemblyai"]  # List of enabled providers
    primary: "assemblyai"    # Primary provider to use
    fallback_enabled: true   # Enable fallback to other providers
    
    # Provider-specific configurations
    assemblyai:
      # API Configuration
      api_key: null  # Set via ASSEMBLYAI_API_KEY environment variable
      base_url: "https://api.assemblyai.com/v2"
      
      # File and processing limits
      max_file_size_mb: 512        # 512MB file size limit
      max_duration_seconds: 7200   # 2 hours maximum duration
      
      # Processing configuration
      poll_interval: 5             # Seconds between status checks
      max_wait_time: 600           # 10 minutes maximum wait time (reduced from dangerous 1800s)
      upload_timeout: 120          # 2 minutes upload timeout (reduced from dangerous 300s)
      connect_timeout: 3           # Connection establishment timeout
      read_timeout: 180            # Read timeout for processing
      
      # Diarization parameters
      default_speakers: null       # Let API auto-detect if null
      enable_speaker_labels: true  # Enable speaker diarization
      language_detection: true     # Auto-detect language
      punctuate: true              # Add punctuation
      format_text: true            # Format text properly
      dual_channel: false          # Assume mono or mixed stereo
      
      # Quality and confidence settings
      confidence_threshold: 0.5    # Minimum confidence for segments
      min_segment_duration: 0.3    # Minimum segment duration (seconds)
      
      # Cost management
      cost_per_second: 0.00025     # Estimated cost per second
      enable_cost_tracking: true   # Track API costs
      
      # Health checking
      health_check_interval: 300   # 5 minutes between health checks
      enable_health_monitoring: true
      
      # Caching configuration
      enable_caching: true         # Cache results to avoid re-processing
      cache_ttl: 86400            # 24 hours cache TTL
      
  # Fallback configuration
  fallback:
    # Order of fallback providers
    chain: ["assemblyai", "pyannote", "mock"]
    
    # Retry configuration for provider failures
    max_retries: 2
    retry_delay: 5  # seconds
    
    # When to trigger fallback
    failure_threshold: 3         # Consecutive failures to trigger fallback
    recovery_timeout: 300        # 5 minutes before trying provider again
    
  # Variant generation with external providers
  variants:
    # Use provider's built-in variant generation
    use_provider_variants: true
    
    # Number of variants to generate per provider
    variants_per_provider: 5
    
    # Variant configuration for ensemble
    conservative:
      speakers_expected_offset: -2  # Expect fewer speakers
      variant_name: "Conservative"
      sensitivity: "low"
      
    balanced:
      speakers_expected_offset: 0   # Use expected speaker count
      variant_name: "Balanced"
      sensitivity: "medium"
      
    liberal:
      speakers_expected_offset: 3   # Expect more speakers
      variant_name: "Liberal"
      sensitivity: "high"
      
    multi_resolution:
      speakers_expected_offset: 1
      variant_name: "Multi_Resolution"
      sensitivity: "medium"
      use_multi_resolution: true
      
    ensemble_optimized:
      speakers_expected_offset: 0
      variant_name: "Ensemble_Optimized"
      sensitivity: "medium"
      optimize_for_ensemble: true
  
  # Integration with existing systems
  integration:
    # Speaker mapping integration
    enable_speaker_mapping: true
    speaker_mapping_threshold: 0.7
    
    # Turn stabilization integration
    enable_turn_stabilization: true
    stabilization_median_window: 3
    
    # Quality control integration
    enable_quality_control: true
    min_confidence_threshold: 0.65
    
    # Voting fusion integration
    enable_voting_fusion: true
    voting_agreement_threshold: 0.6
    
  # Monitoring and observability
  monitoring:
    enable_metrics: true
    enable_telemetry: true
    
    # Performance tracking
    track_processing_time: true
    track_api_costs: true
    track_quality_metrics: true
    
    # Error tracking
    track_failures: true
    alert_on_provider_failure: true
    
  # Development and testing settings
  development:
    # Mock settings for development
    enable_mock_fallback: true
    mock_processing_delay: 2  # seconds
    
    # Testing configuration
    enable_integration_tests: true
    test_timeout: 60  # seconds
    
    # Debug configuration
    debug_mode: false
    log_api_requests: false  # NEVER enable in production for security