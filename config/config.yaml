# Main Configuration File
# Hydra-based configuration for Advanced Ensemble Transcription System

# Include component configurations using defaults
defaults:
  - asr: whisper_variants
  - diarization: external  # Use external providers for production
  - speaker_mapping: consistency_config
  - scoring: multi_dimensional
  - consensus: strategies
  - calibration: methods
  - ui: streamlit_ui
  - decode_strategies
  - auto_glossary: glossary_config  # Auto-glossary system for adaptive term biasing
  - _self_

# Runtime Configuration
app:
  name: "Advanced Ensemble Transcription System"
  version: "1.0.0"
  description: "Generate highly accurate transcripts from long-form MP4 recordings"

# Audio Processing Settings
audio:
  sample_rate: 16000
  channels: 1  # Mono
  max_duration_seconds: 28800  # 8 hours - supports long-form content
  target_format: "wav"
  bit_depth: 16

# File Processing Settings
files:
  supported_video_formats: [".mp4"]
  max_file_size_mb: 2000  # 2GB
  temp_dir_prefix: "ensemble_transcription_"
  cleanup_temp_files: true

# Processing Settings  
processing:
  enable_parallel_processing: true
  chunk_size_seconds: 30  # For large files (legacy setting - see chunking section)

# Elastic Chunking Configuration - Intelligent chunk sizing based on speech characteristics
chunking:
  enabled: true                        # Enable elastic chunking system
  min_chunk_seconds: 15.0              # Minimum chunk size (seconds)
  max_chunk_seconds: 60.0              # Maximum chunk size (seconds)  
  target_chunk_seconds: 30.0           # Default target chunk size (seconds)
  overlap_threshold: 0.3               # Overlap density threshold for size decisions

# Disagreement-Triggered Re-decode Configuration - Intelligent re-decoding for uncertain spans
redecode:
  enabled: true                        # Enable disagreement-triggered re-decode system
  max_redecode_attempts_per_span: 2    # Maximum re-decode attempts per uncertain span
  max_total_redecode_attempts: 10      # Maximum total re-decode attempts per session
  processing_time_budget_seconds: 120.0 # Maximum additional processing time (seconds)
  
  # Uncertainty detection thresholds
  entropy_threshold: 2.5               # Entropy threshold for triggering re-decode
  confidence_gap_threshold: 0.3        # Confidence gap threshold between engines
  min_span_seconds: 2.0                # Minimum span duration for re-decode (seconds)
  max_span_seconds: 30.0               # Maximum span duration for re-decode (seconds)
  min_uncertainty_score: 0.6           # Minimum uncertainty score for re-decode
  
  # Word-level analysis
  min_word_confidence: 0.4             # Minimum word confidence threshold
  word_disagreement_threshold: 0.5     # Word-level disagreement threshold
  acoustic_linguistic_mismatch_threshold: 0.4 # Acoustic-linguistic mismatch threshold
  
  # Diversity enforcement settings
  enforce_diversity: true              # Ensure diverse alternative engine attempts
  max_similar_attempts: 1              # Maximum similar re-decode attempts
  parameter_diversity_threshold: 0.3   # Parameter diversity threshold for engines
  
  # Alternative engine weights and preferences
  alternative_engine_weights:
    faster_whisper_high_temp: 1.0      # High temperature faster-whisper
    faster_whisper_low_temp: 0.8       # Low temperature faster-whisper  
    openai_whisper_beam: 0.9           # OpenAI with beam search
    openai_whisper_greedy: 0.7         # OpenAI greedy decoding
    contextual_prompt: 1.2             # Context-aware prompting
    alternative_chunking: 0.6          # Alternative chunking strategy
  
  # Performance optimization
  enable_parallel_redecode: true       # Enable parallel re-decode processing
  max_parallel_workers: 3              # Maximum parallel workers for re-decode
  cache_redecode_results: true         # Cache re-decode results
  
  # Quality validation
  require_improvement_validation: true  # Require validation of improvements
  min_improvement_threshold: 0.1       # Minimum improvement score threshold
  linguistic_plausibility_check: true  # Enable linguistic plausibility checking
  
  # Speech analysis parameters
  vad_frame_length_ms: 25.0            # VAD frame length (milliseconds)
  vad_hop_length_ms: 10.0              # VAD hop length (milliseconds)
  energy_smoothing_window: 5           # Energy smoothing window size
  voice_activity_threshold: 0.015      # Voice activity detection threshold
  silence_threshold_db: -40.0          # Silence detection threshold (dB)
  
  # Boundary detection parameters
  pause_min_duration: 0.3              # Minimum pause for boundary consideration (seconds)
  pause_max_duration: 2.0              # Maximum pause to consider (seconds)
  speaker_turn_weight: 1.5             # Weight bonus for speaker turn boundaries
  energy_valley_weight: 1.2            # Weight for energy valley boundaries  
  word_boundary_preference: 0.8        # Preference for word boundaries
  
  # Adaptive logic parameters
  high_overlap_threshold: 0.4          # Threshold for high overlap density
  low_overlap_threshold: 0.15          # Threshold for low overlap density
  complexity_analysis_window: 10.0     # Window for complexity analysis (seconds)
  boundary_search_window: 5.0          # Search window around target boundary (seconds)
  
  # Performance and caching
  enable_parallel_analysis: true       # Enable parallel speech analysis
  cache_audio_analysis: true           # Cache audio analysis results
  max_analysis_workers: 3              # Maximum workers for parallel analysis
  chunk_overlap_seconds: 1.0           # Overlap between chunks for continuity (seconds)

# Reliability Configuration - Centralized timeout, concurrency, and circuit breaker settings
reliability:
  # Global timeout settings (seconds)
  timeouts:
    api_request: 900      # Individual API request timeout - increased for long-form content
    asr_variant: 600      # Per-ASR variant timeout - increased for long-form content
    diarization: 1800     # Diarization pipeline timeout - increased for long-form content
    file_processing: 120  # File I/O operations
    
  # Concurrency control
  concurrency:
    max_asr_requests: 3       # Max concurrent ASR API calls
    max_diarization: 2        # Max concurrent diarization processes
    max_file_processors: 4    # Max concurrent file operations
    thread_pool_queue_size: 50  # Bounded queue size
    
  # Retry configuration using tenacity
  retry:
    # Default retry settings for all services
    default:
      max_attempts: 5
      initial_wait: 1.0       # seconds
      max_wait: 60.0          # seconds  
      exponential_base: 2
      jitter: true
      
    # Service-specific retry overrides
    openai:
      max_attempts: 3
      initial_wait: 2.0
      max_wait: 30.0
      retry_on_status: [429, 500, 502, 503, 504]  # Rate limit + server errors
      
    huggingface:
      max_attempts: 4
      initial_wait: 1.5
      max_wait: 45.0
      retry_on_status: [429, 500, 502, 503, 504]
      
    assemblyai:
      max_attempts: 5
      initial_wait: 2.0
      max_wait: 60.0
      retry_on_status: [429, 500, 502, 503, 504]
      
    subprocess:
      max_attempts: 3
      initial_wait: 0.5
      max_wait: 10.0
      
  # Circuit breaker settings
  circuit_breakers:
    # Default circuit breaker config
    default:
      failure_threshold: 5      # Consecutive failures to trip breaker
      recovery_timeout: 60      # Seconds before testing recovery
      success_threshold: 2      # Successes needed to close breaker
      timeout_counts_as_failure: true
      max_failure_history: 100
      
    # Service-specific circuit breaker overrides
    openai:
      failure_threshold: 3      # More aggressive for API limits
      recovery_timeout: 120     # Longer recovery for rate limits
      
    huggingface:
      failure_threshold: 4      # Model loading can be flaky
      recovery_timeout: 90
      
    assemblyai:
      failure_threshold: 3      # API service reliability
      recovery_timeout: 120     # Longer recovery for external service
      
    ffmpeg:
      failure_threshold: 2      # System processes should fail fast
      recovery_timeout: 30

# Resource-Aware Scheduler with RTF Budgets and Auto-Downgrade Rules
scheduler:
  enabled: true                      # Enable resource-aware scheduling
  global_timeout_minutes: 240.0      # Maximum total processing time - increased for long-form content
  downgrade_strategy: "balanced"     # conservative, balanced, aggressive
  enable_predictive_scheduling: true # Enable audio complexity prediction
  enable_resource_monitoring: true   # Enable system resource monitoring
  memory_limit_mb: 8192              # Memory limit for triggering downgrades (8GB)
  cpu_limit_percent: 90              # CPU limit for triggering downgrades
  
  # RTF (Real-Time Factor) Budgets for Processing Stages
  # RTF = processing_time / audio_duration
  rtf_budgets:
    audio_extraction:
      maximum_rtf: 0.5              # Maximum RTF before mandatory downgrade
      target_rtf: 0.2               # Target RTF for optimal quality
      minimum_rtf: 0.1              # Minimum RTF for basic functionality
      timeout_minutes: 2.0          # Hard timeout in minutes
    
    audio_preprocessing:
      maximum_rtf: 1.0
      target_rtf: 0.3
      minimum_rtf: 0.1
      timeout_minutes: 2.0
    
    diarization:
      maximum_rtf: 4.0              # Multi-variant diarization
      target_rtf: 2.0               # Balanced approach
      minimum_rtf: 1.5              # Single variant
      timeout_minutes: 8.0
    
    source_separation:
      maximum_rtf: 8.0              # Heavy model processing
      target_rtf: 4.0               # Balanced processing
      minimum_rtf: 2.0              # Light model processing
      timeout_minutes: 10.0
    
    overlap_processing:
      maximum_rtf: 6.0              # Full overlap pipeline
      target_rtf: 3.0               # Standard processing
      minimum_rtf: 1.0              # Basic overlap handling
      timeout_minutes: 8.0
    
    speaker_tracking:
      maximum_rtf: 2.0              # Advanced ECAPA-TDNN tracking
      target_rtf: 1.0               # Standard tracking
      minimum_rtf: 0.5              # Basic tracking
      timeout_minutes: 3.0
    
    asr_ensemble:
      maximum_rtf: 6.0              # Full ensemble (5 variants per diarization)
      target_rtf: 4.0               # Reduced ensemble
      minimum_rtf: 1.0              # Single ASR engine
      timeout_minutes: 12.0
    
    term_mining:
      maximum_rtf: 0.8              # Full auto-glossary mining
      target_rtf: 0.4               # Standard mining
      minimum_rtf: 0.1              # Basic term extraction
      timeout_minutes: 2.0
    
    dialect_processing:
      maximum_rtf: 1.0              # Multi-dialect analysis
      target_rtf: 0.5               # Standard dialect handling
      minimum_rtf: 0.2              # Basic dialect support
      timeout_minutes: 2.0
    
    confidence_scoring:
      maximum_rtf: 0.5              # Full DALRO scoring
      target_rtf: 0.3               # Standard scoring
      minimum_rtf: 0.1              # Basic scoring
      timeout_minutes: 2.0
    
    consensus:
      maximum_rtf: 0.3              # Multi-dimensional consensus
      target_rtf: 0.1               # Standard consensus
      minimum_rtf: 0.05             # Basic selection
      timeout_minutes: 1.0
    
    worklist_reprocessing:
      maximum_rtf: 2.0              # Selective reprocessing
      target_rtf: 1.0               # Standard worklist
      minimum_rtf: 0.3              # Basic improvement
      timeout_minutes: 3.0
    
    boundary_realignment:
      maximum_rtf: 0.4              # Full realignment
      target_rtf: 0.2               # Standard realignment
      minimum_rtf: 0.1              # Basic alignment
      timeout_minutes: 1.0
    
    text_normalization:
      maximum_rtf: 0.2              # Executive profile
      target_rtf: 0.1               # Readable profile
      minimum_rtf: 0.05             # Light profile
      timeout_minutes: 1.0
    
    output_generation:
      maximum_rtf: 0.1              # Multiple output formats
      target_rtf: 0.05              # Standard outputs
      minimum_rtf: 0.02             # Basic output
      timeout_minutes: 1.0
  
  # Auto-Downgrade Rules for Each Stage
  downgrade_rules:
    # Source Separation: Heavy → Light → Skip
    source_separation:
      - trigger_rtf_threshold: 6.0
        trigger_memory_mb_threshold: 6144    # 6GB memory threshold
        downgrade_action: "switch_to_light_model"
        fallback_quality_level: "fast"
        skip_stage: false
        condition: null
      
      - trigger_rtf_threshold: 4.0
        trigger_memory_mb_threshold: null
        downgrade_action: "skip_separation"
        fallback_quality_level: "minimal"
        skip_stage: true
        condition: "complexity_score > 2.0"
    
    # Diarization: Multi-variant → Single variant → Basic clustering
    diarization:
      - trigger_rtf_threshold: 3.0
        trigger_cpu_percent_threshold: 85
        downgrade_action: "reduce_variants"
        fallback_quality_level: "fast"
        skip_stage: false
        condition: null
      
      - trigger_rtf_threshold: 2.0
        trigger_memory_mb_threshold: null
        downgrade_action: "basic_clustering_only"
        fallback_quality_level: "minimal"
        skip_stage: false
        condition: null
    
    # ASR: Ensemble → Reduced variants → Single engine
    asr_ensemble:
      - trigger_rtf_threshold: 4.0
        trigger_memory_mb_threshold: null
        downgrade_action: "reduce_asr_variants"
        fallback_quality_level: "balanced"
        skip_stage: false
        condition: null
      
      - trigger_rtf_threshold: 2.0
        trigger_cpu_percent_threshold: 90
        downgrade_action: "single_asr_engine"
        fallback_quality_level: "fast"
        skip_stage: false
        condition: null
    
    # Text Normalization: Executive → Readable → Light → Verbatim
    text_normalization:
      - trigger_rtf_threshold: 0.15
        trigger_memory_mb_threshold: null
        downgrade_action: "lighter_normalization"
        fallback_quality_level: "fast"
        skip_stage: false
        condition: null
      
      - trigger_rtf_threshold: 0.1
        trigger_memory_mb_threshold: null
        downgrade_action: "minimal_normalization"
        fallback_quality_level: "minimal"
        skip_stage: false
        condition: null
  
  # Quality Level Definitions
  quality_levels:
    maximum:
      description: "Highest quality, longest processing time"
      rtf_multiplier: 1.0           # Use maximum RTF budgets
      
    high:
      description: "High quality, moderate processing time"
      rtf_multiplier: 0.75          # Use 75% of maximum RTF budgets
      
    balanced:
      description: "Balance quality vs speed"
      rtf_multiplier: 0.6           # Use 60% of maximum RTF budgets
      
    fast:
      description: "Fast processing, good quality"
      rtf_multiplier: 0.4           # Use 40% of maximum RTF budgets
      
    minimal:
      description: "Minimal processing, basic quality"
      rtf_multiplier: 0.25          # Use 25% of maximum RTF budgets
  
  # Audio Complexity Estimation
  complexity_estimation:
    enable_audio_analysis: true     # Perform lightweight audio analysis
    analysis_duration_seconds: 30   # Analyze first 30 seconds for complexity
    cache_estimates: true           # Cache complexity estimates
    cache_ttl_seconds: 3600         # Cache time-to-live (1 hour)
    
    # Complexity factors
    duration_weight: 0.3            # Weight for audio duration
    speaker_weight: 0.25            # Weight for number of speakers
    noise_weight: 0.2               # Weight for noise level
    overlap_weight: 0.15            # Weight for speech overlap
    dialect_weight: 0.1             # Weight for dialect complexity
  
  # Resource Monitoring
  resource_monitoring:
    enable_background_monitoring: true  # Enable background resource monitoring
    monitoring_interval_seconds: 1.0   # Monitor resources every second
    snapshot_retention_count: 300      # Keep last 5 minutes of snapshots
    enable_predictive_alerts: true     # Enable predictive resource alerts
    
    # Alert thresholds
    memory_warning_percent: 75      # Warn when memory usage > 75%
    memory_critical_percent: 85     # Critical when memory usage > 85%
    cpu_warning_percent: 80         # Warn when CPU usage > 80%
    cpu_critical_percent: 90        # Critical when CPU usage > 90%
    
    # Load average thresholds (for systems that support it)
    load_average_warning_multiplier: 1.5   # Warn when load > 1.5x CPU cores
    load_average_critical_multiplier: 2.0  # Critical when load > 2.0x CPU cores
  
  # Performance Telemetry
  telemetry:
    enable_performance_tracking: true   # Enable detailed performance tracking
    enable_stage_profiling: true       # Enable per-stage profiling
    enable_recommendation_engine: true # Enable optimization recommendations
    
    # Telemetry data retention
    session_history_retention_days: 7  # Keep session data for 7 days
    aggregate_metrics_retention_days: 30 # Keep aggregate metrics for 30 days
    
    # Reporting
    enable_performance_reports: true   # Generate performance reports
    report_generation_interval_hours: 24 # Generate reports every 24 hours
    enable_trend_analysis: true        # Enable performance trend analysis
  
  # Integration Settings
  integration:
    ensemble_manager_integration: true # Integrate with EnsembleManager
    capability_manager_integration: true # Integrate with CapabilityManager
    observability_integration: true   # Integrate with observability system
    cache_integration: true           # Integrate with caching system
    
    # Stage hook configuration
    enable_stage_hooks: true          # Enable stage lifecycle hooks
    enable_progress_callbacks: true   # Enable progress callback integration
    enable_preemptive_downgrades: true # Enable preemptive downgrade decisions
  
  # Advanced Settings
  advanced:
    enable_adaptive_budgets: false    # Adaptive RTF budgets based on performance
    learning_rate: 0.1                # Learning rate for adaptive systems
    enable_statistical_modeling: false # Statistical models for performance prediction
    
    # Emergency settings
    enable_emergency_bypass: false    # Emergency bypass for critical processing
    emergency_quality_level: "minimal" # Quality level for emergency bypass
    emergency_timeout_multiplier: 2.0 # Multiply timeouts in emergency mode
    
    # Debug settings
    enable_debug_logging: false       # Enable detailed debug logging
    enable_stage_profiling: false     # Enable detailed stage profiling
    export_profiling_data: false     # Export profiling data for analysis

# API Configuration
api:
  openai:
    model: "whisper-1"
    api_key: null  # Set via environment variable
  huggingface:
    model: "pyannote/speaker-diarization-3.1"
    auth_token: null  # Set via environment variable
    use_auth_token: true
  assemblyai:
    api_key: null  # Set via ASSEMBLYAI_API_KEY environment variable
    base_url: "https://api.assemblyai.com/v2"
    enable_diarization: true

# Quality Gates
quality:
  max_timestamp_regression_rate: 0.02  # 2%
  min_boundary_fit_rate: 0.92  # 92%
  min_overlap_plausibility: 0.30
  confidence_threshold: 0.70
  enable_quality_repair: true

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  structured_logging: true
  log_to_file: true
  log_dir: "logs"

# Experimental Features
experimental:
  enable_voting_fusion: true
  enhanced_chunking: true
  linguistic_scoring: true
  repair_engine: true
  quality_controller: true
  enhanced_decode_strategies: true  # Enable enhanced decode strategy system

# Post-Fusion Alignment Realigner
realigner:
  enabled: true                    # Enable post-fusion boundary realignment
  max_boundary_shift_ms: 80        # Maximum allowed boundary movement (milliseconds)
  energy_window_ms: 50             # Window size for energy analysis (milliseconds)
  cost_weight_energy: 0.6          # Energy alignment cost weight (0.0 - 1.0)
  cost_weight_distance: 0.4        # Distance penalty weight (0.0 - 1.0)
  cost_weight_smoothness: 0.2      # Smoothness constraint weight (0.0 - 1.0)
  min_word_duration_ms: 50         # Minimum word duration after realignment
  energy_threshold: 0.3            # Energy threshold for boundary detection
  boundary_search_radius_ms: 100   # Search radius for boundary candidates
  dtw_constraint_window: 0.15      # DTW constraint window (15% of sequence length)
  enable_fallback: true            # Enable graceful fallback on errors
  validate_timing_constraints: true # Enable strict timing validation

# Consensus and Calibration Integration
consensus:
  enabled: true
  default_strategy: "best_single_candidate"
  enable_ab_testing: true
  record_methodology_choices: true

calibration:
  enabled: true
  default_method: "registry_based"
  enable_ab_testing: true
  per_domain_adjustment: true

# Pipeline Integration Settings
pipeline:
  consensus_integration_point: "post_scoring"  # When to apply consensus
  calibration_integration_point: "pre_final_score"  # When to apply calibration
  enable_methodology_comparison: true
  record_processing_metadata: true
  enable_enhanced_decode: true  # Enable enhanced decode strategy system in pipeline

# Source Separation Quality Gating
separation:
  enabled: true                 # Enable source separation processing
  min_overlap_percent: 8.0      # Minimum overlap percentage to trigger separation
  min_stem_snr_db: 12.0         # Minimum stem SNR (dB) to pass QA gate
  max_stem_leakage: 0.12        # Maximum voice leakage rate between stems
  enable_quality_gating: true   # Enable quality-based gating decisions
  fallback_to_single_channel: true  # Fallback to single-channel when QA fails

# Proper Noun and Number Verifier
verifier:
  enabled: true                 # Enable constrained proper noun and number verification
  min_margin: 0.1              # Minimum scoring margin for variant acceptance
  max_glossary_entries: 50     # Top K glossary entries to include in allowed set
  glossary_weight_bonus: 0.2   # Bonus scoring weight for auto-glossary matches
  block_unseen_variants: true  # Block variants not in observed or glossary sets
  enable_number_formatting: true  # Preserve exact formatting for numbers/alphanumerics
  enable_telemetry: true       # Enable detailed metrics and logging

# Automated Evaluation Gates System - Prevents Quality Regressions
evaluation_gates:
  enabled: true                 # Enable automated evaluation gates
  fail_builds_on_violations: true  # Fail CI builds when thresholds violated
  
  # WER (Word Error Rate) Thresholds by scenario type (percentages)
  wer_thresholds:
    clean_audio: 1.0           # ≤1.0% for clean, clear audio scenarios
    overlap_heavy: 3.0         # ≤3.0% for heavy speaker overlap scenarios  
    challenging_audio: 5.0     # ≤5.0% for challenging audio conditions
    edge_cases: 10.0           # ≤10.0% for edge case scenarios
    
  # DER (Diarization Error Rate) Thresholds (percentages)
  der_thresholds:
    baseline: 5.0              # ≤5% speaker confusion rate for baseline
    challenging: 15.0          # ≤15% for challenging diarization scenarios
    
  # Entity Accuracy Thresholds (percentages)
  entity_accuracy_thresholds:
    baseline: 95.0             # ≥95% for proper nouns, numbers, technical terms
    challenging: 85.0          # ≥85% for challenging audio/content scenarios
    
  # Confidence Calibration Thresholds
  confidence_thresholds:
    baseline: 0.70             # ≥70% confidence calibration accuracy
    challenging: 0.50          # ≥50% for challenging scenarios
    
  # Processing Performance Thresholds
  performance_thresholds:
    processing_time_ratio_max: 2.0      # Max 2x processing time vs audio duration
    processing_time_ratio_challenging: 4.0  # Max 4x for challenging scenarios
    
  # Regression Detection Settings
  regression_detection:
    enabled: true              # Enable regression analysis against historical data
    history_window_days: 30    # Days of historical data for comparison
    wer_increase_max: 0.5      # Maximum WER increase (%) before regression alert
    der_increase_max: 2.0      # Maximum DER increase (%) before regression alert
    confidence_decrease_max: 5.0  # Maximum confidence decrease (%) before alert
    statistical_confidence: 0.95  # 95% confidence interval for significance tests
    min_samples_significance: 5    # Minimum samples needed for statistical tests
    
  # Test Execution Settings
  test_execution:
    enable_parallel_execution: true  # Run tests in parallel for faster execution
    max_concurrent_tests: 4     # Maximum concurrent test executions
    test_timeout_seconds: 300   # Timeout for individual test cases (5 minutes)
    enable_live_processing: false  # Use live ensemble processing vs simulation
    
  # Reporting and Output Settings
  reporting:
    enable_detailed_reports: true   # Generate detailed evaluation reports
    store_historical_results: true # Store results for regression tracking
    results_retention_days: 90     # Days to retain historical results
    enable_trend_analysis: true    # Enable trend analysis and projections
    export_ci_artifacts: true     # Export results as CI artifacts
    
  # Gate Behavior Settings
  gate_behavior:
    warning_tolerance_percent: 10.0  # % within threshold to trigger warnings
    enable_warnings_as_failures: false  # Treat warnings as CI failures
    enable_statistical_significance: true  # Require statistical significance for failures
    bypass_gates_on_emergency: false    # Emergency bypass (use with caution)
    
  # Test Suite Configuration
  test_suite:
    gold_test_set_path: "tests/gold_test_set"  # Path to gold standard test cases
    test_definitions_file: "test_definitions.json"  # Test case definitions
    ground_truth_directory: "ground_truth"     # Ground truth data directory
    results_output_directory: "evaluation_results"  # Results storage directory
    
  # Entity Recognition Settings
  entity_recognition:
    entity_types:             # Types of entities to evaluate
      - "proper_nouns"        # Person names, places, organizations
      - "numbers"             # Numeric values, quantities, dates
      - "technical_terms"     # Domain-specific technical terminology
      - "alphanumeric_codes"  # Codes, IDs, reference numbers
    fuzzy_matching_enabled: true     # Enable fuzzy matching for entity comparison
    fuzzy_matching_threshold: 0.8    # Similarity threshold for fuzzy matches
    case_sensitive_matching: false   # Case-insensitive entity matching
    
  # Integration Settings
  integration:
    ensemble_manager_integration: true  # Integrate with EnsembleManager
    pytest_integration: true       # Enable pytest test runner integration  
    ci_exit_codes:                 # Exit codes for CI integration
      pass: 0                      # All gates passed
      fail: 1                      # One or more gates failed
      warning: 0                   # Warnings present but no failures
      error: 1                     # System/execution errors
    metric_export_format: "json"   # Format for metric exports (json, yaml, csv)
    
  # Advanced Settings
  advanced:
    enable_adaptive_thresholds: false  # Adaptive thresholds based on content difficulty
    content_difficulty_analysis: true # Analyze content difficulty for threshold adjustment
    enable_scenario_specific_gates: true  # Use different gates for different scenarios
    bootstrap_confidence_intervals: true  # Use bootstrapping for confidence intervals
    outlier_detection_enabled: true       # Detect and handle statistical outliers
    outlier_threshold_std_devs: 2.5       # Standard deviations for outlier detection

# Comprehensive Metrics and Alerting System Configuration
metrics:
  enabled: true                     # Enable comprehensive metrics collection
  collection_interval_seconds: 30   # Metric collection interval
  aggregation_window_seconds: 300   # 5-minute aggregation window
  enable_background_processing: true # Enable background metric processing
  background_processing_interval: 60 # Background processing interval (seconds)
  
  # Structured Logging Configuration
  structured_logging:
    enabled: true                   # Enable JSON-formatted structured logging
    log_level: "INFO"               # Minimum log level for metrics
    include_context: true           # Include contextual information
    include_correlation_ids: true   # Include correlation IDs for request tracking
    log_file_path: "logs/metrics"   # Path for metrics log files
    log_rotation: "1 day"          # Log rotation interval
    log_retention: "30 days"       # Log retention period
    compression: "gz"              # Log compression format
  
  # Alert Configuration
  alerting:
    enabled: true                   # Enable threshold-based alerting
    
    # Alert destinations
    alert_destinations:
      console:
        enabled: true               # Console output for development
      file_logging:
        enabled: true               # File-based alert logging
        path: "logs/alerts"         # Alert log directory
      webhook:
        enabled: false              # Webhook notifications (disabled by default)
        url: null                   # Webhook URL
      email:
        enabled: false              # Email notifications (disabled by default)
        smtp_host: null             # SMTP configuration
        recipients: []              # Email recipients list
    
    # Alert thresholds by category
    thresholds:
      # Performance metrics
      performance:
        processing_time_per_minute:
          warning: 90.0             # 1.5x expected processing time
          critical: 120.0           # 2x expected processing time
        rtf_ratio:
          warning: 1.5              # Real-time factor warning threshold
          critical: 2.0             # Real-time factor critical threshold
        memory_usage_peak_mb:
          warning: 6144             # 6GB memory warning
          critical: 8192            # 8GB memory critical
        cache_hit_rate:
          warning: 60.0             # Below 60% cache hits
          info: 80.0                # Above 80% cache hits (positive alert)
      
      # Quality metrics  
      quality:
        word_error_rate:
          warning: 3.0              # 3% WER warning threshold
          critical: 5.0             # 5% WER critical threshold
        diarization_error_rate:
          warning: 8.0              # 8% DER warning threshold
          critical: 15.0            # 15% DER critical threshold
        entity_accuracy:
          warning: 85.0             # Below 85% entity accuracy
          info: 95.0                # Above 95% entity accuracy (positive)
        confidence_score_avg:
          warning: 0.7              # Below 70% average confidence
          info: 0.9                 # Above 90% average confidence (positive)
        boundary_error_rate:
          warning: 0.05             # 5% boundary error rate
          critical: 0.10            # 10% boundary error rate
      
      # System health metrics
      system_health:
        error_rate:
          warning: 5.0              # 5% error rate warning
          critical: 10.0            # 10% error rate critical
        timeout_count:
          warning: 5                # 5 timeouts per session
          critical: 10              # 10 timeouts per session
        fallback_activation_rate:
          warning: 20.0             # 20% fallback activation rate
          critical: 40.0            # 40% fallback activation rate  
        resource_utilization_cpu:
          warning: 80.0             # 80% CPU utilization
          critical: 95.0            # 95% CPU utilization
      
      # Business metrics
      business:
        success_rate:
          warning: 90.0             # Below 90% success rate
          critical: 85.0            # Below 85% success rate
        files_processed_per_hour:
          info: 10                  # Good throughput indicator
        user_satisfaction_proxy:
          warning: 7.0              # Below 7/10 satisfaction proxy
          info: 8.5                 # Above 8.5/10 satisfaction proxy
  
  # Metric definitions and retention
  metric_definitions:
    retention_days: 30              # Default metric retention period
    export_interval_hours: 24       # Metric export interval
    enable_trend_analysis: true     # Enable trend analysis
    trend_analysis_window_days: 7   # Trend analysis lookback window
    
    # Metric categories with specific settings
    categories:
      performance:
        collection_priority: "high" # High priority for performance metrics
        sampling_rate: 1.0          # Collect 100% of performance metrics
      quality:
        collection_priority: "high" # High priority for quality metrics
        sampling_rate: 1.0          # Collect 100% of quality metrics
      system_health:
        collection_priority: "medium" # Medium priority for system health
        sampling_rate: 0.8          # Collect 80% of system health metrics
      business:
        collection_priority: "low"  # Lower priority for business metrics
        sampling_rate: 0.5          # Collect 50% of business metrics (sample)
  
  # Real-time monitoring
  real_time_monitoring:
    enabled: true                   # Enable real-time monitoring
    update_interval_seconds: 5      # Real-time update interval
    dashboard_integration: true     # Enable dashboard integration
    anomaly_detection: true         # Enable anomaly detection
    anomaly_sensitivity: 0.1        # Anomaly detection sensitivity (10%)
    statistical_window_size: 100    # Statistical analysis window size
  
  # CI/CD integration
  ci_integration:
    enabled: true                   # Enable CI integration features
    ci_mode_detection: true         # Auto-detect CI environment
    export_ci_reports: true         # Export CI-specific reports
    fail_builds_on_violations: true # Fail CI builds on threshold violations
    
    # CI-specific quality gates
    ci_quality_gates:
      word_error_rate:
        max: 5.0                    # Maximum WER for CI passes
      diarization_error_rate:
        max: 15.0                   # Maximum DER for CI passes
      error_rate:
        max: 10.0                   # Maximum error rate for CI passes
      success_rate:
        min: 85.0                   # Minimum success rate for CI passes
      processing_time_per_minute:
        max: 120.0                  # Maximum processing time for CI passes
    
    # Regression detection
    regression_detection:
      enabled: true                 # Enable performance regression detection
      baseline_comparison_days: 7   # Compare against last 7 days baseline
      regression_threshold_percent: 20.0 # 20% performance regression threshold
      metrics_to_monitor:           # Metrics to monitor for regressions
        - "word_error_rate"
        - "processing_time_per_minute"
        - "success_rate"
        - "confidence_score_avg"
    
    # Test integration
    test_integration:
      enabled: true                 # Enable test framework integration
      collect_test_metrics: true    # Collect metrics during tests
      generate_test_reports: true   # Generate test-specific reports
      test_quality_gates: true     # Apply quality gates to tests