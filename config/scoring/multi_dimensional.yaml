# Confidence Scoring Configuration
# Multi-dimensional scoring weights and parameters for transcript evaluation

# @package _global_
scoring:
  # Primary scoring weights (must sum to 1.0)
  weights:
    D: 0.28  # Diarization consistency
    A: 0.32  # ASR alignment and confidence  
    L: 0.18  # Linguistic quality
    R: 0.12  # Cross-run agreement
    O: 0.10  # Overlap handling
    
  # Alternative weight configurations for experimentation
  weight_presets:
    default:
      D: 0.28
      A: 0.32
      L: 0.18
      R: 0.12
      O: 0.10
      
    asr_focused:
      D: 0.20
      A: 0.45
      L: 0.20
      R: 0.10
      O: 0.05
      
    diarization_focused:
      D: 0.45
      A: 0.25
      L: 0.15
      R: 0.10
      O: 0.05
      
    linguistic_focused:
      D: 0.20
      A: 0.25
      L: 0.35
      R: 0.15
      O: 0.05
      
    balanced_ensemble:
      D: 0.25
      A: 0.25
      L: 0.20
      R: 0.15
      O: 0.15

  # Dimension-specific parameters
  dimensions:
    diarization:
      boundary_tolerance_ms: 500
      speaker_consistency_weight: 0.7
      temporal_stability_weight: 0.3
      overlap_penalty_factor: 0.1
      
    asr:
      word_confidence_weight: 0.6
      segment_confidence_weight: 0.4
      timestamp_accuracy_weight: 0.2
      language_model_agreement_weight: 0.3
      
    linguistic:
      grammar_coherence_weight: 0.4
      semantic_consistency_weight: 0.3
      vocabulary_diversity_weight: 0.2
      sentence_structure_weight: 0.1
      
    agreement:
      exact_match_weight: 0.5
      semantic_similarity_weight: 0.3
      structural_similarity_weight: 0.2
      consensus_threshold: 0.6
      
    overlap:
      simultaneous_speech_detection: 0.6
      turn_taking_quality: 0.3
      speaker_separation_quality: 0.1
      overlap_resolution_accuracy: 0.4

  # Normalization parameters
  normalization:
    method: "min_max_calibrated"  # Options: "min_max", "z_score", "min_max_calibrated"
    calibration_ranges:
      D: [0.0, 1.0]
      A: [0.0, 1.0] 
      L: [0.0, 1.0]
      R: [0.0, 1.0]
      O: [0.0, 1.0]
    outlier_handling: "clip"  # Options: "clip", "winsorize", "remove"
    
  # Performance optimization
  optimization:
    cache_vectorizers: true
    batch_similarity_computation: true
    parallel_dimension_scoring: true
    use_sparse_matrices: true
    memory_efficient_mode: false
    
  # Confidence thresholds
  thresholds:
    excellent: 0.85
    good: 0.70
    acceptable: 0.55
    poor: 0.40
    unacceptable: 0.25