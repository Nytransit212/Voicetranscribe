# UI Configuration - Streamlit Interface Settings
# User interface parameters and display options

# @package _global_
ui:
  app:
    title: "🎯 Advanced Ensemble Transcription System"
    page_icon: "🎯"
    layout: "wide"
    initial_sidebar_state: "expanded"
    
  # Color scheme for speakers
  speaker_colors:
    - "#FF6B6B"  # Red
    - "#4ECDC4"  # Teal
    - "#45B7D1"  # Blue
    - "#96CEB4"  # Green
    - "#FFEAA7"  # Yellow
    - "#DDA0DD"  # Plum
    - "#98D8C8"  # Mint
    - "#F7DC6F"  # Light Yellow
    - "#BB8FCE"  # Purple
    - "#85C1E9"  # Light Blue
    
  # Display settings
  display:
    max_transcript_preview_segments: 10
    max_candidate_rankings_shown: 5
    confidence_decimal_places: 2
    processing_time_decimal_places: 1
    enable_progress_animations: true
    show_debug_info: false
    
  # File upload settings
  file_upload:
    max_file_size_mb: 2000
    accepted_formats: [".mp4"]
    show_file_info: true
    enable_drag_drop: true
    
  # Processing configuration UI
  processing_controls:
    default_expected_speakers: 10
    speaker_range:
      min: 2
      max: 20
      step: 1
    noise_level_options:
      - "Low"
      - "Medium" 
      - "High"
    default_noise_level: "Medium"
    
  # Scoring weights UI
  scoring_weights_ui:
    enable_adjustment: true
    show_in_sidebar: true
    auto_normalize: true
    slider_step: 0.01
    show_descriptions: true
    enable_presets: true
    show_reset_button: true
    
    descriptions:
      D: "Speaker boundary accuracy and turn stability"
      A: "Speech recognition quality and word-level confidence"
      L: "Grammar, coherence, and language model agreement"
      R: "Consistency across multiple transcription runs"
      O: "Quality of simultaneous speech detection"
      
  # Results display
  results:
    show_confidence_breakdown: true
    show_ensemble_audit: true
    enable_transcript_preview: true
    show_processing_metrics: true
    enable_download_buttons: true
    
  # Quality control dashboard
  qc_dashboard:
    enable_flagged_segments: true
    show_repair_suggestions: true
    enable_manual_corrections: true
    highlight_low_confidence: true
    confidence_color_coding: true
    
  # Navigation
  navigation:
    pages:
      main: "🏠 Main Processing"
      qc: "🔍 Quality Control"
    default_page: "main"
    
  # Messages and alerts
  messages:
    processing_start: "🚀 Starting ensemble processing..."
    processing_complete: "✅ Processing completed successfully!"
    processing_error: "❌ Processing failed"
    no_results: "ℹ️ No results yet"
    results_available: "✅ Results Available"
    
  # Help and documentation
  help:
    show_tooltips: true
    enable_expandable_sections: true
    show_installation_instructions: true
    enable_feature_explanations: true