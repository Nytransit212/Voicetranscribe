# Speaker Mapping Consistency Configuration
# Hungarian Alignment Algorithm for Cross-Chunk Speaker ID Consistency

# Core Algorithm Settings
algorithm:
  similarity_threshold: 0.7  # Minimum similarity for speaker matching (0.0-1.0)
  embedding_dim: 128         # Dimensionality of speaker embeddings
  min_segment_duration: 1.0  # Minimum segment duration for embedding extraction (seconds)
  
# Audio Processing Settings
audio_processing:
  # MFCC features
  mfcc_features: 13          # Number of MFCC coefficients
  
  # Spectral features
  spectral_features: 7       # Number of spectral features
  
  # Prosodic features  
  prosodic_features: 5       # Number of prosodic features (pitch, energy, etc.)
  
  # Delta features
  enable_delta_features: true # Whether to include delta (derivative) features
  
# Chunked Processing Settings
chunked_processing:
  enable_chunked_processing: true    # Enable chunked processing for long audio
  chunk_duration_threshold: 900.0   # Threshold in seconds (15 minutes) to enable chunking
  optimal_chunk_duration: 300.0     # Target chunk duration (5 minutes)
  min_chunk_duration: 255.0         # Minimum chunk duration (4:15 minutes)
  max_chunk_duration: 315.0         # Maximum chunk duration (5:15 minutes)
  
# Hungarian Algorithm Settings
hungarian:
  max_assignment_cost: 0.3   # Maximum cost for Hungarian assignment (1 - similarity)
  enable_unmatched_speakers: true  # Allow speakers with no good match
  confidence_penalty: 0.1    # Penalty for low confidence segments
  
# Similarity Calculation Settings
similarity:
  # Cosine similarity weight (primary metric)
  cosine_weight: 0.7
  
  # Confidence-based weighting
  confidence_weight: 0.3
  
  # Minimum confidence for reliable matching
  min_confidence_threshold: 0.5
  
  # Similarity calculation methods
  normalize_embeddings: true     # Normalize embedding vectors
  use_euclidean_fallback: false  # Use Euclidean distance if cosine fails
  
# Caching and Performance
performance:
  enable_embedding_cache: true       # Cache computed embeddings
  cache_size_limit: 1000            # Maximum cached embeddings per session
  
  # Parallel processing
  enable_parallel_extraction: true  # Parallel embedding extraction
  max_workers: 4                    # Maximum parallel workers
  
# Consistency Metrics Settings
metrics:
  enable_metrics_generation: true    # Generate consistency metrics
  
  # Continuity calculation
  boundary_analysis_segments: 3      # Number of segments to analyze at boundaries
  continuity_overlap_threshold: 0.3  # Minimum overlap for continuity
  
  # Quality thresholds
  min_improvement_threshold: 0.05    # Minimum improvement to report success
  target_continuity_score: 0.85     # Target cross-chunk continuity score
  
# Debugging and Logging
debug:
  enable_detailed_logging: true      # Enable detailed speaker mapping logs
  log_similarity_matrices: false    # Log similarity matrices (verbose)
  log_assignment_details: true      # Log Hungarian assignment details
  save_mapping_artifacts: false     # Save intermediate mapping artifacts
  
# Fallback Settings
fallback:
  # If speaker mapping fails
  use_original_segments: true       # Fall back to original segments
  preserve_timing: true             # Preserve original timing information
  
  # Error handling
  max_mapping_attempts: 3           # Maximum attempts to perform mapping
  timeout_seconds: 300              # Timeout for speaker mapping process
  
# Integration Settings
integration:
  # DiarizationEngine integration
  apply_to_all_variants: true       # Apply mapping to all diarization variants
  preserve_variant_metadata: true   # Preserve original variant information
  
  # EnsembleManager integration
  enable_cross_variant_analysis: true  # Analyze consistency across variants
  coordinate_global_mapping: true     # Coordinate mapping across all variants
  
# Quality Control
quality_control:
  # Validation thresholds
  max_speaker_count_change: 2       # Maximum change in speaker count per chunk
  min_segment_preservation: 0.95    # Minimum percentage of segments to preserve
  
  # Consistency checks
  validate_temporal_order: true     # Ensure segments remain in temporal order
  check_speaker_distribution: true  # Validate speaker time distribution
  
  # Repair mechanisms
  enable_automatic_repair: true     # Attempt to repair inconsistencies
  repair_confidence_threshold: 0.8  # Confidence threshold for repairs