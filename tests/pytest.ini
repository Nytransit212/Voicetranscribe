[tool:pytest]
# Pytest configuration for ensemble transcription system

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    acceptance: acceptance tests validating end-to-end quality
    integration: integration tests with external dependencies
    unit: fast unit tests with mocks
    slow: slow-running tests (>10 seconds)
    regression: regression detection tests
    baseline: baseline scenario tests (high accuracy expected)
    challenging: challenging scenario tests (moderate accuracy expected)
    edge_case: edge case tests (graceful degradation expected)

# Test execution
addopts = 
    --strict-markers
    --tb=short
    --disable-warnings
    -v
    --cov=core
    --cov=utils
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80

# Timeout for tests
timeout = 300

# Parallel execution
# addopts = -n auto  # Uncomment for parallel test execution

# Test output
console_output_style = progress
junit_family = xunit2

# Coverage settings
[coverage:run]
source = core, utils
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*
    */migrations/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING: