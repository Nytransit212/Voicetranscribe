# Pre-commit configuration for Advanced Ensemble Transcription System
# Ensures code quality and consistency before commits

default_language_version:
  python: python3.11

repos:
  # Ruff - Fast Python linter and code formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        name: ruff-lint
        description: "Run Ruff for linting"
        args: [--fix, --exit-non-zero-on-fix]
        types: [python]
      - id: ruff-format
        name: ruff-format
        description: "Run Ruff for formatting"
        types: [python]

  # MyPy - Static type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.1
    hooks:
      - id: mypy
        name: mypy-type-check
        description: "Run MyPy static type checking"
        args: [--strict, --show-error-codes, --no-error-summary]
        additional_dependencies:
          - types-requests
          - types-setuptools
          - pandas-stubs
          - numpy
        exclude: ^(tests/|docs/|scripts/)

  # Built-in hooks for basic checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: trim-whitespace
        description: "Trim trailing whitespace"
      - id: end-of-file-fixer
        name: fix-line-endings
        description: "Ensure files end with newline"
      - id: check-yaml
        name: check-yaml
        description: "Validate YAML syntax"
      - id: check-toml
        name: check-toml
        description: "Validate TOML syntax"
      - id: check-json
        name: check-json
        description: "Validate JSON syntax"
      - id: check-added-large-files
        name: check-large-files
        description: "Prevent large files from being committed"
        args: [--maxkb=5000]
      - id: check-merge-conflict
        name: check-merge-conflicts
        description: "Check for merge conflict markers"
      - id: debug-statements
        name: check-debug-statements
        description: "Check for debug statements"
      - id: check-executables-have-shebangs
        name: check-shebangs
        description: "Ensure executables have shebangs"

  # Security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        name: bandit-security-scan
        description: "Run Bandit security linting"
        args: [-c, pyproject.toml]
        exclude: ^tests/

  # Conventional commits validation
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.0.0
    hooks:
      - id: conventional-pre-commit
        name: conventional-commits
        description: "Validate conventional commit format"
        stages: [commit-msg]

# Configuration for specific scenarios
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: [mypy]  # Skip mypy in CI (handled by GitHub Actions)
  submodules: false