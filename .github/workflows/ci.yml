# GitHub Actions CI Pipeline for Advanced Ensemble Transcription System
# Runs comprehensive testing, linting, and type checking across multiple Python versions

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Allow manual triggering

env:
  PYTHON_VERSION_MATRIX: "['3.10', '3.11']"

jobs:
  # Quality checks - linting, formatting, type checking
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        
    - name: Install UV
      uses: astral-sh/setup-uv@v2
      with:
        version: "latest"
        
    - name: Install dependencies
      run: |
        uv sync --dev
        
    - name: Run Ruff linting
      run: |
        uv run ruff check .
        
    - name: Run Ruff formatting check
      run: |
        uv run ruff format --check .
        
    - name: Run MyPy type checking
      run: |
        uv run mypy core/ utils/ config/ --strict
        
    - name: Check configuration files
      run: |
        # Validate YAML configurations
        python -c "import yaml; [yaml.safe_load(open(f)) for f in ['config/config.yaml', 'config/asr/whisper_variants.yaml', 'config/diarization/pyannote_variants.yaml', 'config/scoring/multi_dimensional.yaml', 'config/ui/streamlit_ui.yaml']]"
        
        # Validate pyproject.toml
        uv run python -c "import tomllib; tomllib.load(open('pyproject.toml', 'rb'))"

  # Unit tests
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
      fail-fast: false
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        
    - name: Install UV
      uses: astral-sh/setup-uv@v2
      with:
        version: "latest"
        
    - name: Install dependencies
      run: |
        uv sync --dev
        
    - name: Create test directory
      run: |
        mkdir -p tests
        
    - name: Run tests with pytest
      run: |
        uv run pytest tests/ -v --tb=short --cov=core --cov=utils --cov=config --cov-report=xml --cov-report=term-missing
      env:
        OPENAI_API_KEY: "test-key"
        HUGGINGFACE_TOKEN: "test-token"
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      if: matrix.python-version == '3.11'
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  # Integration tests (optional, with mock services)
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [quality, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        
    - name: Install UV
      uses: astral-sh/setup-uv@v2
      with:
        version: "latest"
        
    - name: Install dependencies
      run: |
        uv sync --dev
        
    - name: Run integration tests
      run: |
        # Test with mock data and services
        uv run python test_enhanced_chunking.py
        uv run python test_enhanced_linguistic_scoring.py
        uv run python test_ensemble_pipeline.py
      env:
        OPENAI_API_KEY: "test-key"
        HUGGINGFACE_TOKEN: "test-token"

  # Security scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install UV
      uses: astral-sh/setup-uv@v2
      with:
        version: "latest"
        
    - name: Install dependencies
      run: |
        uv sync --dev
        
    - name: Run Bandit security scan
      run: |
        uv run bandit -r core/ utils/ config/ -f json -o bandit-report.json
        
    - name: Upload Bandit report
      uses: actions/upload-artifact@v3
      with:
        name: bandit-security-report
        path: bandit-report.json

  # Dependency vulnerability scan
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install UV
      uses: astral-sh/setup-uv@v2
      with:
        version: "latest"
        
    - name: Run pip-audit
      run: |
        uv pip install pip-audit
        uv run pip-audit --requirement pyproject.toml --format=json --output=audit-report.json
        
    - name: Upload audit report  
      uses: actions/upload-artifact@v3
      with:
        name: dependency-audit-report
        path: audit-report.json

  # Documentation and config validation
  docs-and-config:
    name: Documentation & Config Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install UV
      uses: astral-sh/setup-uv@v2
      with:
        version: "latest"
        
    - name: Install dependencies
      run: |
        uv sync --dev
        
    - name: Validate Hydra configs
      run: |
        # Test that Hydra can load all configs
        uv run python -c "
        from omegaconf import OmegaConf
        import os
        for root, dirs, files in os.walk('config'):
            for file in files:
                if file.endswith('.yaml'):
                    path = os.path.join(root, file)
                    try:
                        cfg = OmegaConf.load(path)
                        print(f'✓ {path} is valid')
                    except Exception as e:
                        print(f'✗ {path} is invalid: {e}')
                        exit(1)
        "
        
    - name: Check project metadata
      run: |
        # Validate that all required metadata is present
        uv run python -c "
        import tomllib
        with open('pyproject.toml', 'rb') as f:
            data = tomllib.load(f)
        assert 'project' in data
        assert 'tool' in data
        assert 'ruff' in data['tool']
        assert 'mypy' in data['tool']
        print('✓ Project metadata is valid')
        "